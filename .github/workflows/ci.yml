name: Tests 🎳

on:
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "mesh_tools/**"
      - "tests/**"
      - "requirements/**"
      - "pyproject.toml"
      - ".docker/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "mesh_tools/**"
      - "tests/**"
      - "requirements/**"
      - "pyproject.toml"
      - ".docker/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint 🐍
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install Python requirements
        run: pip install -r requirements/dev.txt

      - name: Run Ruff linter
        run: ruff check --output-format=github .

      - name: Run Ruff formatter
        run: ruff format --check --diff .

  tests-unit:
    name: Unit tests 🧪
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/testing.txt

      - name: Install Python requirements
        run: pip install -r requirements/testing.txt

      - name: Run unit tests
        run: pytest tests/unit/ --cov=mesh_tools --cov-report=term-missing

  release:
    name: Release 📦
    needs: [lint, tests-unit]

    runs-on: ubuntu-latest
    if: github.repository_owner == 'Artelia' && startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/packaging.txt

      - name: Install Qt lrelease
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qt5-qmake qttools5-dev-tools

      - name: Install Python requirements
        run: pip install -r requirements/packaging.txt

      - name: Package and deploy the zip
        run: >-
          qgis-plugin-ci
          release ${{ env.RELEASE_VERSION }}
          --github-token ${{ secrets.GITHUB_TOKEN }}
          --allow-uncommitted-changes
          --osgeo-username ${{ secrets.OSGEO_USERNAME }}
          --osgeo-password ${{ secrets.OSGEO_PASSWORD }}
